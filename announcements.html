<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Tong-its — Announcements</title>
<meta name="theme-color" content="#0a2118" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;600;700;800&display=swap" />
<style>
  /* ============================================================
     Shared "Gabi ng Tong-its" look (same palette as the game and
     the server list). This block is copied into every page so
     each file stays fully self-contained — edit freely.
     ============================================================ */
  :root{
    --gold:#f6b73c; --gold-hi:#ffdf8e; --gold-deep:#c98a16; --gold-dim:rgba(246,183,60,.55);
    --cream:#fbf4e0; --cream-soft:#efe3c4; --ink:#211c14;
    --danger:#e4574d; --info:#37b5a7; --good:#3ecf8e;
    --night-1:#123526; --night-2:#0a2118; --night-3:#051009;
    --panel:rgba(6,26,18,.55); --line:rgba(246,183,60,.14);
    --txt-dim:#9cc3ac; --txt-soft:#cfe4d6;
    --display:'Baloo 2',ui-rounded,'Segoe UI',system-ui,sans-serif;
    --body:'Nunito',system-ui,-apple-system,'Segoe UI',sans-serif;
    --sat:env(safe-area-inset-top,0px); --sab:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;min-height:100%;}
  body{font-family:var(--body);color:var(--cream);-webkit-font-smoothing:antialiased;
    background:
      radial-gradient(90% 55% at 50% -12%, rgba(246,183,60,.16), transparent 60%),
      radial-gradient(130% 100% at 50% -10%, var(--night-1) 0%, var(--night-2) 55%, var(--night-3) 100%);
    background-attachment:fixed;
    padding:calc(22px + var(--sat)) 18px calc(30px + var(--sab));}
  ::selection{background:var(--gold);color:var(--ink);}
  .wrap{max-width:760px;margin:0 auto;}

  /* small page header (logo + page title) */
  .head{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:14px;}
  .head h1{margin:0;font-family:var(--display);font-weight:800;font-size:30px;line-height:1;letter-spacing:.3px;
    background:linear-gradient(180deg,var(--gold-hi) 10%,var(--gold) 52%,var(--gold-deep) 95%);
    -webkit-background-clip:text;background-clip:text;color:transparent;filter:drop-shadow(0 2px 0 rgba(0,0,0,.35));}
  .head .sub{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--txt-dim);font-weight:800;}

  /* ---- the tab bar shared by all four pages ----
     Each page marks its own link with class="on".  */
  .tabs{display:flex;gap:6px;background:rgba(6,26,18,.55);border-radius:999px;padding:5px;
    box-shadow:inset 0 0 0 1px var(--line);margin-bottom:18px;flex-wrap:wrap;}
  .tabs a{flex:1;text-align:center;text-decoration:none;color:var(--txt-soft);font-family:var(--display);
    font-weight:700;font-size:13px;padding:9px 8px;border-radius:999px;white-space:nowrap;}
  .tabs a:hover{color:var(--gold);}
  .tabs a.on{background:linear-gradient(180deg,var(--gold-hi),var(--gold));color:#3a2604;box-shadow:0 2px 0 #8f6410;}

  .lead{color:var(--txt-soft);font-size:14px;line-height:1.55;margin:0 0 18px;}
  .lead b{color:var(--gold);}

  /* ---- patch cards ---- */
  .patch{background:var(--panel);border:1px solid rgba(255,255,255,.08);border-radius:18px;
    padding:16px 18px;margin-bottom:14px;backdrop-filter:blur(4px);box-shadow:0 6px 20px rgba(0,0,0,.3);}
  .patch-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:4px;}
  .patch .date{font-family:var(--display);font-weight:800;color:var(--gold);font-size:13px;letter-spacing:.04em;}
  .patch .ver{font-size:11px;font-weight:800;color:var(--txt-dim);background:rgba(0,0,0,.3);padding:2px 9px;border-radius:999px;}
  .patch h2{margin:2px 0 8px;font-family:var(--display);font-weight:800;font-size:19px;color:#fff8ea;}
  .patch ul{margin:0;padding-left:20px;}
  .patch li{font-size:13.5px;line-height:1.6;color:var(--txt-soft);margin-bottom:4px;}
  .patch li b{color:var(--cream);}
  /* colored tag chips — colors come from the TAGS map in the script below */
  .tag{font-family:var(--display);font-size:9.5px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;
    padding:3px 9px;border-radius:999px;}
  /* pinned announcements get a gold ring and float to the top */
  .patch.pinned{border-color:rgba(246,183,60,.55);box-shadow:0 6px 24px rgba(0,0,0,.35), inset 0 0 0 1.5px rgba(246,183,60,.35);}
  .patch .body{font-size:13.5px;line-height:1.65;color:var(--txt-soft);}
  .patch .body p{margin:8px 0;}
  .patch .body a{color:var(--gold);}
  .patch .body ul{margin:6px 0;padding-left:20px;}
  footer{margin-top:26px;color:var(--txt-dim);font-size:12px;text-align:center;line-height:1.6;}
  @media (max-width:560px){
    body{padding:calc(16px + var(--sat)) 12px calc(24px + var(--sab));}
    .tabs a{font-size:12px;padding:8px 4px;}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="head">
    <h1>📣 Announcements</h1>
    <span class="sub">news · events · roadmap</span>
  </div>

  <!-- ===== tab bar: keep the SAME four links on every page; move class="on"
       to whichever page the file is. If you add a fifth page one day, add its
       link here AND in the other three files. ===== -->
  <nav class="tabs">
    <a href="index.html">🖥️ Servers</a>
    <a href="patch-notes.html">🧪 Test patches</a>
    <a href="releases.html">🏆 Main releases</a>
    <a href="announcements.html" class="on">📣 Announcements</a>
  </nav>

  <p class="lead">News from the felt — <b>events, roadmap plans, and anything worth telling the barkada</b>.
  Pinned posts stay at the top.</p>

  <!-- Patch cards are rendered here by the script below -->
  <div id="patches"></div>

  <footer>Made for kapamilya, kabarkada, at kapitbahay. 🃏</footer>
</div>

<script>
/* ==============================================================
   HOW TO ADD AN ANNOUNCEMENT
   --------------------------------------------------------------
   This is your free-form page — roadmaps, events, downtime
   notices, tournament nights, anything.

   1. Copy the template block at the top of the ANNOUNCEMENTS array.
   2. Keep NEWEST entries at the TOP (pinned ones float above all).

   Fields:
     date   : any text, e.g. "July 4, 2026"
     title  : the headline
     pinned : true = gold ring + stays at the very top (optional)
     tag    : small chip text, e.g. "EVENT", "ROADMAP", "NOTICE"
              (optional — delete the line for no chip)
     body   : the post itself. Plain HTML is allowed here, so you
              can use <p>…</p> paragraphs, <b>bold</b>, <ul><li>
              lists, and <a href="…">links</a>. Since only YOU
              edit this file, that's safe.
   ============================================================== */

const ANNOUNCEMENTS = [

  /* ---- TEMPLATE — copy me ------------------------------------------
  {
    date: "Month DD, 2026",
    title: "Your headline here",
    pinned: false,
    tag: "EVENT",
    body: `
      <p>Write anything here. <b>Bold</b> works, and so do
      <a href="https://tongits.playy.online/">links</a>.</p>
      <ul><li>Bullet one</li><li>Bullet two</li></ul>
    `,
  },
  ------------------------------------------------------------------- */

  {
    date: "July 4, 2026",
    title: "Welcome to the new Tong-its! 🎉",
    pinned: true,
    tag: "NEWS",
    body: `
      <p>The full redesign is live — new look, sounds, player records, join requests,
      invites, chat replies, and room names. It's still <b>free, no sign-up, no coins</b>.</p>
      <p>On the roadmap next:</p>
      <ul>
        <li>Whatever the barkada asks for — try things on the
            <a href="https://test-tongits.playy.online/">test server</a> and shout in world chat!</li>
      </ul>
      <p><i>Tara, laro na!</i></p>
    `,
  },

{
  date: "July 04, 2026",
  title: "Tong‑its Online – What’s new & what’s next",
  pinned: false,
  tag: "UPDATE",
  body: `
    <p><strong>Tong‑its Online</strong> is a free, unranked, online multiplayer version of the Filipino three‑player rummy game, built to run entirely on Cloudflare’s free tier. No accounts, no coins, no ranks — just open a table and play, or find people in the lobby.</p>

    <p><strong>Status:</strong> Playable and feature‑rich. Core rules, the full draw/challenge showdown, a real‑time lobby with world chat and presence, mobile support, and two card looks are all in. Newest work: a full visual redesign (“Gabi ng Tong‑its”), sound + haptics, a local record/streak strip, hand sorting, PWA install, and a tabbed mobile lobby.</p>

    <p><strong>What it is</strong><br>
    Tong‑its is a 3‑player rummy where you race to clear your hand into melds (sets and runs), lay off (<em>sapaw</em>) onto exposed melds, and either go out completely (Tongits) or call a draw and win the showdown on the lowest points. This is a faithful online version, rebuilt so people can play each other in real time from a browser or phone — no installs.</p>

    <p><strong>How it’s built</strong><br>
    Everything fits on Cloudflare’s free plan: static assets for the client, one Worker as the front door, one SQLite‑backed Durable Object per room (game state, WebSocket Hibernation, turn timers), and a single global Lobby hub Durable Object that serves the room directory and real‑time presence + world chat over WebSockets.</p>

    <p><strong>Current progress (done)</strong></p>

    <p><em>The game</em></p>
    <ul>
      <li>Real‑time multiplayer — the server owns the cards, so the client can’t cheat.</li>
      <li>Full draw / challenge rules — call a draw only before drawing, with an exposed meld, and not right after a <em>sapaw</em> by or onto you. Opponents with a meld then Challenge or Fold in a popup; opponents without a meld are auto‑burned. The caller’s hand stays hidden until everyone decides; only the caller and challengers reveal. Lowest count wins; ties go to the challenger (last one, in a three‑way tie).</li>
      <li>Survival <em>sapaw</em> — you can lay off onto any meld (yours or an opponent’s) even without your own meld, to trim your hand and block the opponent’s draw call. Bots do this too when they’re under threat.</li>
      <li><em>Sapaw</em> by tap or drag — arm a card and tap a glowing meld, or drag a card (from your hand or a group) straight onto a meld. Drag a card onto the discard to end your turn.</li>
      <li>Round‑over → Ready / Leave — every human readies up for the next round (AI auto‑readies); it deals when everyone’s ready. Anyone can leave to the lobby; the rest see a red “player left” notice, and the freed seat re‑lists in the lobby.</li>
      <li>Turn timers with a constant blinking AFK warning; going idle auto‑discards your lowest card.</li>
      <li>Two card looks — a clean CSS deck by default, plus an optional SVG sprite deck via a Card skin toggle (your choice is remembered).</li>
      <li>Animations — cards fly from the draw pile to a hand, from a hand to the discard, and onto melds — for you and your opponents.</li>
      <li>Mobile — the log is hidden, chat becomes a popup with a new‑message dot, a floating turn timer blinks red on your turn, and your hand fans to fit the screen.</li>
    </ul>

    <p><em>The lobby (real‑time hub)</em></p>
    <ul>
      <li>Full‑page lobby — Open Tables, Online Players, and World Chat side by side.</li>
      <li>Presence — everyone online is listed with a green dot and a LOBBY or PLAYING status.</li>
      <li>Unique names — case‑insensitive; a name in use by someone online is rejected. Names allow letters, numbers, and at most one space.</li>
      <li>World chat — global chat that keeps the last 50 messages so newcomers see recent history.</li>
      <li>@mentions — type @name, or click a player to insert it; a bell chimes when you’re mentioned in the lobby (silent while you’re in a game).</li>
      <li>How to play lives in the lobby (removed from the in‑game screen).</li>
    </ul>

    <p><em>The polish layer (client‑only, no rules changed)</em></p>
    <ul>
      <li>New visual identity — night‑market palette (tungsten gold on deep felt), narra‑wood rail, capiz‑cream cards, Baloo 2 + Nunito type, and a lobby hero with a fanned‑cards logo.</li>
      <li>Sound &amp; haptics — tiny synthesized WebAudio cues (draw, discard, meld, your‑turn chime, win/lose sting) plus phone vibration; one‑tap toggle in the lobby and in‑game header, remembered per device.</li>
      <li>Your record — a localStorage stats strip in the lobby: rounds, wins + win %, Tongits count, current/best win streak, and a day‑streak. No accounts needed; it all lives on the device.</li>
      <li>Sort your hand — ⇅ button toggles suit/rank ordering of ungrouped cards (client‑side only).</li>
      <li>Tabbed mobile lobby — Tables / Players / World chat tabs on small screens instead of a long scroll.</li>
      <li>Installable — web manifest + generated icons, theme color, and safe‑area insets, so “Add to Home Screen” gives a proper app feel.</li>
      <li>Economy off — no coins, pots, ranks, or accounts. Everything is casual.</li>
    </ul>

    <p><strong>Roadmap — what’s next</strong></p>
    <ul>
      <li><strong>Reconnect grace</strong> — a short window so a dropped connection doesn’t instantly drop you from a table (today, disconnect = leave).</li>
      <li><strong>Quick play</strong> — a one‑tap “join any open table.”</li>
      <li><strong>AI‑rescue rooms</strong> — surface a 2‑humans‑plus‑a‑bot table with an open seat so a third human can swap in for the bot.</li>
      <li><strong>Lobby polish</strong> — mention matching that respects word boundaries, a bell toggle, and removing the old (now‑unused) center‑modal lobby code.</li>
      <li><strong>Mobile polish</strong> — continued tuning on small screens.</li>
    </ul>

    <p><em>Deliberately deferred (to stay free and casual):</em> coins/economy, ranks and leaderboards, registration/account recovery, and social login.</p>

    <p><strong>Deploy notes</strong><br>
    The client is static assets; the server is the Worker plus two Durable Object classes (Room, Lobby), both SQLite‑backed and free‑plan eligible. <code>wrangler.toml</code> already contains their migrations — adding WebSockets to the existing Lobby class needs no new migration. After updating files, redeploy and do a quick two‑browser check of the lobby (presence, world chat, unique names, the bell) and a two‑device check of a game (challenge/fold, ready‑up, animations), since live WebSocket behavior only proves out with more than one player connected.</p>

    <p>Built on Cloudflare Workers + Durable Objects. A casual project — feedback welcome.</p>

    <p>👉 <a href="https://tongits.playy.online/">Play now</a></p>
  `
}


]; // ---- end of ANNOUNCEMENTS ----

/* ---------- rendering (no need to edit below this line) ---------- */
const box = document.getElementById("patches");
// pinned posts first, then array order
const ordered = [...ANNOUNCEMENTS].sort((x, y) => (y.pinned ? 1 : 0) - (x.pinned ? 1 : 0));
for (const p of ordered) {
  const el = document.createElement("article");
  el.className = "patch" + (p.pinned ? " pinned" : "");
  el.innerHTML = `
    <div class="patch-top">
      <span class="date">${p.pinned ? "📌 " : ""}${p.date}</span>
      ${p.tag ? `<span class="tag" style="background:linear-gradient(180deg,var(--gold-hi),var(--gold));color:#3a2604">${p.tag}</span>` : ""}
    </div>
    <h2>${p.title}</h2>
    <div class="body">${p.body || ""}</div>`;
  box.appendChild(el);
}
</script>
</body>
</html>
