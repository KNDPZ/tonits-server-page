<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Tong-its — Announcements</title>
<meta name="theme-color" content="#0a2118" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;600;700;800&display=swap" />
<style>
  /* ============================================================
     Shared "Gabi ng Tong-its" look (same palette as the game and
     the server list). This block is copied into every page so
     each file stays fully self-contained — edit freely.
     ============================================================ */
  :root{
    --gold:#f6b73c; --gold-hi:#ffdf8e; --gold-deep:#c98a16; --gold-dim:rgba(246,183,60,.55);
    --cream:#fbf4e0; --cream-soft:#efe3c4; --ink:#211c14;
    --danger:#e4574d; --info:#37b5a7; --good:#3ecf8e;
    --night-1:#123526; --night-2:#0a2118; --night-3:#051009;
    --panel:rgba(6,26,18,.55); --line:rgba(246,183,60,.14);
    --txt-dim:#9cc3ac; --txt-soft:#cfe4d6;
    --display:'Baloo 2',ui-rounded,'Segoe UI',system-ui,sans-serif;
    --body:'Nunito',system-ui,-apple-system,'Segoe UI',sans-serif;
    --sat:env(safe-area-inset-top,0px); --sab:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;min-height:100%;}
  body{font-family:var(--body);color:var(--cream);-webkit-font-smoothing:antialiased;
    background:
      radial-gradient(90% 55% at 50% -12%, rgba(246,183,60,.16), transparent 60%),
      radial-gradient(130% 100% at 50% -10%, var(--night-1) 0%, var(--night-2) 55%, var(--night-3) 100%);
    background-attachment:fixed;
    padding:calc(22px + var(--sat)) 18px calc(30px + var(--sab));}
  ::selection{background:var(--gold);color:var(--ink);}
  .wrap{max-width:760px;margin:0 auto;}

  /* small page header (logo + page title) */
  .head{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:14px;}
  .head h1{margin:0;font-family:var(--display);font-weight:800;font-size:30px;line-height:1;letter-spacing:.3px;
    background:linear-gradient(180deg,var(--gold-hi) 10%,var(--gold) 52%,var(--gold-deep) 95%);
    -webkit-background-clip:text;background-clip:text;color:transparent;filter:drop-shadow(0 2px 0 rgba(0,0,0,.35));}
  .head .sub{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--txt-dim);font-weight:800;}

  /* ---- the tab bar shared by all four pages ----
     Each page marks its own link with class="on".  */
  .tabs{display:flex;gap:6px;background:rgba(6,26,18,.55);border-radius:999px;padding:5px;
    box-shadow:inset 0 0 0 1px var(--line);margin-bottom:18px;flex-wrap:wrap;}
  .tabs a{flex:1;text-align:center;text-decoration:none;color:var(--txt-soft);font-family:var(--display);
    font-weight:700;font-size:13px;padding:9px 8px;border-radius:999px;white-space:nowrap;}
  .tabs a:hover{color:var(--gold);}
  .tabs a.on{background:linear-gradient(180deg,var(--gold-hi),var(--gold));color:#3a2604;box-shadow:0 2px 0 #8f6410;}

  .lead{color:var(--txt-soft);font-size:14px;line-height:1.55;margin:0 0 18px;}
  .lead b{color:var(--gold);}

  /* ---- patch cards ---- */
  .patch{background:var(--panel);border:1px solid rgba(255,255,255,.08);border-radius:18px;
    padding:16px 18px;margin-bottom:14px;backdrop-filter:blur(4px);box-shadow:0 6px 20px rgba(0,0,0,.3);}
  .patch-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:4px;}
  .patch .date{font-family:var(--display);font-weight:800;color:var(--gold);font-size:13px;letter-spacing:.04em;}
  .patch .ver{font-size:11px;font-weight:800;color:var(--txt-dim);background:rgba(0,0,0,.3);padding:2px 9px;border-radius:999px;}
  .patch h2{margin:2px 0 8px;font-family:var(--display);font-weight:800;font-size:19px;color:#fff8ea;}
  .patch ul{margin:0;padding-left:20px;}
  .patch li{font-size:13.5px;line-height:1.6;color:var(--txt-soft);margin-bottom:4px;}
  .patch li b{color:var(--cream);}
  /* colored tag chips — colors come from the TAGS map in the script below */
  .tag{font-family:var(--display);font-size:9.5px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;
    padding:3px 9px;border-radius:999px;}
  /* pinned announcements get a gold ring and float to the top */
  .patch.pinned{border-color:rgba(246,183,60,.55);box-shadow:0 6px 24px rgba(0,0,0,.35), inset 0 0 0 1.5px rgba(246,183,60,.35);}
  .patch .body{font-size:13.5px;line-height:1.65;color:var(--txt-soft);}
  .patch .body p{margin:8px 0;}
  .patch .body a{color:var(--gold);}
  .patch .body ul{margin:6px 0;padding-left:20px;}
  footer{margin-top:26px;color:var(--txt-dim);font-size:12px;text-align:center;line-height:1.6;}
  @media (max-width:560px){
    body{padding:calc(16px + var(--sat)) 12px calc(24px + var(--sab));}
    .tabs a{font-size:12px;padding:8px 4px;}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="head">
    <h1>📣 Announcements</h1>
    <span class="sub">news · events · roadmap</span>
  </div>

  <!-- ===== tab bar: keep the SAME four links on every page; move class="on"
       to whichever page the file is. If you add a fifth page one day, add its
       link here AND in the other three files. ===== -->
  <nav class="tabs">
    <a href="index.html">🖥️ Servers</a>
    <a href="patch-notes.html">🧪 Test patches</a>
    <a href="releases.html">🏆 Main releases</a>
    <a href="announcements.html" class="on">📣 Announcements</a>
  </nav>

  <p class="lead">News from the felt — <b>events, roadmap plans, and anything worth telling the barkada</b>.
  Pinned posts stay at the top.</p>

  <!-- Patch cards are rendered here by the script below -->
  <div id="patches"></div>

  <footer>Made for kapamilya, kabarkada, at kapitbahay. 🃏</footer>
</div>

<script>
/* ==============================================================
   HOW TO ADD AN ANNOUNCEMENT
   --------------------------------------------------------------
   This is your free-form page — roadmaps, events, downtime
   notices, tournament nights, anything.

   1. Copy the template block at the top of the ANNOUNCEMENTS array.
   2. Keep NEWEST entries at the TOP (pinned ones float above all).

   Fields:
     date   : any text, e.g. "July 4, 2026"
     title  : the headline
     pinned : true = gold ring + stays at the very top (optional)
     tag    : small chip text, e.g. "EVENT", "ROADMAP", "NOTICE"
              (optional — delete the line for no chip)
     body   : the post itself. Plain HTML is allowed here, so you
              can use <p>…</p> paragraphs, <b>bold</b>, <ul><li>
              lists, and <a href="…">links</a>. Since only YOU
              edit this file, that's safe.
   ============================================================== */

const ANNOUNCEMENTS = [

  /* ---- TEMPLATE — copy me ------------------------------------------
  {
    date: "Month DD, 2026",
    title: "Your headline here",
    pinned: false,
    tag: "EVENT",
    body: `
      <p>Write anything here. <b>Bold</b> works, and so do
      <a href="https://tongits.playy.online/">links</a>.</p>
      <ul><li>Bullet one</li><li>Bullet two</li></ul>
    `,
  },
  ------------------------------------------------------------------- */

  {
    date: "July 4, 2026",
    title: "Welcome to the new Tong-its! 🎉",
    pinned: true,
    tag: "NEWS",
    body: `
      <p>The full redesign is live — new look, sounds, player records, join requests,
      invites, chat replies, and room names. It's still <b>free, no sign-up, no coins</b>.</p>
      <p>On the roadmap next:</p>
      <ul>
        <li>Whatever the barkada asks for — try things on the
            <a href="https://test-tongits.playy.online/">test server</a> and shout in world chat!</li>
      </ul>
      <p><i>Tara, laro na!</i></p>
    `,
  },

]; // ---- end of ANNOUNCEMENTS ----

/* ---------- rendering (no need to edit below this line) ---------- */
const box = document.getElementById("patches");
// pinned posts first, then array order
const ordered = [...ANNOUNCEMENTS].sort((x, y) => (y.pinned ? 1 : 0) - (x.pinned ? 1 : 0));
for (const p of ordered) {
  const el = document.createElement("article");
  el.className = "patch" + (p.pinned ? " pinned" : "");
  el.innerHTML = `
    <div class="patch-top">
      <span class="date">${p.pinned ? "📌 " : ""}${p.date}</span>
      ${p.tag ? `<span class="tag" style="background:linear-gradient(180deg,var(--gold-hi),var(--gold));color:#3a2604">${p.tag}</span>` : ""}
    </div>
    <h2>${p.title}</h2>
    <div class="body">${p.body || ""}</div>`;
  box.appendChild(el);
}
</script>
</body>
</html>
